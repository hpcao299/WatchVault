name: Watch
options:
  bundleIdPrefix: com.yourname
  xcodeVersion: "15.0"
targets:
  Watch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Watch
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Watch needs access to your photo library to import photos and videos into the vault."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Watch needs access to remove imported photos and videos from your photo library."
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
